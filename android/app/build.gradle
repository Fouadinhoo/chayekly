plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.chayekly"
    compileSdk 36

    defaultConfig {
        applicationId "com.chayekly"
        minSdk 24
        targetSdk 36
        versionCode 2
        versionName "1.0.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
        }
    }
}

// --- FIX FOR KOTLIN 2.1.0 ---
tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
    kotlinOptions {
        jvmTarget = "17"
    }
}

flutter {
    source "../.."
}